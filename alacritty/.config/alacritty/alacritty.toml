[env]
term = "xterm-256color"

[terminal.shell]
program = "/opt/homebrew/bin/zellij"
# args = ["-l", "welcome"]

[window]
startup_mode = "Maximized"
option_as_alt = "OnlyLeft"
blur = false
decorations = "Buttonless"
dynamic_title = true

[scrolling]
history = 10000

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
