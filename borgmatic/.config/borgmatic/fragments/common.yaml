keep_daily: 7
keep_weekly: 4
keep_monthly: 6
keep_yearly: 1

encryption_passphrase: "{credential keepassxc ~/Sync/keepassxc.kdbx borgmatic}"

source_directories:
  - ~/Desktop/
  - ~/Documents/
  - ~/Pictures/
  - ~/Development/
  - ~/Sync/
  - ~/.dotfiles/
  - ~/.ssh/
  - ~/.gnupg/
  - ~/.config/
  - ~/.local/share/
  - ~/.local/state/
  - ~/Library/Application Support/Anki2/andreasknapper/
  - ~/Library/Application Support/activitywatch/
  - ~/Library/Application Support/Firefox/Profiles/

patterns:
  - '- **/.git'
  - '- **/build'
  - '- **/dist'
  - '- **/node_modules'
  - '- **/CMakeFiles'
