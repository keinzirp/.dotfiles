keep_daily: 7
keep_weekly: 4
keep_monthly: 6
keep_yearly: 1

encryption_passphrase: "{credential keepassxc ~/Sync/keepassxc.kdbx borgmatic}"

source_directories:
  - ~/Desktop/
  - ~/Sync/
  - ~/.dotfiles/
  - ~/Library/Application Support/Anki2/User 1/
  - ~/.local/share/timewarrior/

patterns:
  - '- **/.git'
  - '- **/build'
  - '- **/dist'
  - '- **/node_modules'
  - '- **/CMakeFiles'
