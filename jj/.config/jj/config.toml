[ui]
editor = "nvim"
pager = "delta"
diff-formatter = ":git"
default-command = ["status"]

[user]
name = "keinzirp"
email = "keinzirp@gmail.com"

[[--scope]]
--when.repositories = ["~/Development/Work"]
[--scope.user]
email = "andreas@rough.app"

[signing]
behavior = "own"
backend = "gpg"

[aliases]
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]
mine = ["bookmark", "list", "-r", "mine()"]

[templates]
draft_commit_description = '''
concat(
  builtin_draft_commit_description,
  "\nJJ: ignore-rest\n",
  diff.git(),
)
'''
